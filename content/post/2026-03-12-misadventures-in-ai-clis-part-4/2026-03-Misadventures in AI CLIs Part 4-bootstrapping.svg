e" stroke="none" pointer-events="all"/><path d="M 396.5 36.5 C 365.75 32.42 355.64 63.82 383 69.5 C 359.4 83.89 382.77 110.48 405.5 97 C 415.23 114.08 460.75 120.44 479 97 C 512.04 96.96 510.04 76.99 490.25 64 C 508.5 46.62 483.5 19.41 452.75 31 C 439.05 18.06 407.57 15.94 396.5 36.5 C 396.5 36.5 396.5 36.5 396.5 36.5" fill-opacity="0.3" fill="#ffffff" stroke="none" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212));"/><path d="M 396.5 36.5 C 366.83 36.16 362.8 66.52 383 69.5 M 396.5 36.5 C 366.13 39.01 355.79 60.67 383 69.5 M 383 69.5 C 355.68 78.39 389.24 104.04 405.5 97 M 383 69.5 C 359.64 78.42 382.15 108.62 405.5 97 M 405.5 97 C 416.62 121.17 461.35 119.67 479 97 M 405.5 97 C 418.22 122.58 462.08 118.31 479 97 M 479 97 C 511.25 97.46 506.74 71.55 490.25 64 M 479 97 C 504.5 100.99 507.68 71.35 490.25 64 M 490.25 64 C 512.67 40.29 481.03 21.82 452.75 31 M 490.25 64 C 510.1 46.53 475.33 22.27 452.75 31 M 452.75 31 C 431.01 14.81 405.82 15.12 396.5 36.5 M 452.75 31 C 436.35 14.69 404.95 12.17 396.5 36.5 M 396.5 36.5 C 396.5 36.5 396.5 36.5 396.5 36.5 M 396.5 36.5 C 396.5 36.5 396.5 36.5 396.5 36.5" fill="none" stroke="#000000" stroke-opacity="0.3" stroke-linejoin="round" stroke-linecap="round" stroke-miterlimit="10" pointer-events="all" style="stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"/></g></g><g data-cell-id="wBIAXKxkVHZm5fD3SIu9-6"><g transform="translate(0.5,0.5)"><rect x="9" y="104" width="220" height="245" fill="none" stroke="none" pointer-events="all"/></g><g><g><switch><foreignObject style="overflow: visible; text-align: left;" pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe flex-start; justify-content: unsafe flex-start; width: 218px; height: 1px; padding-top: 111px; margin-left: 11px;"><div style="box-sizing: border-box; font-size: 0; text-align: left; max-height: 241px; overflow: hidden; color: #000000; "><div style="display: inline-block; font-size: 13px; font-family: Helvetica; color: light-dark(#000000, #ffffff); line-height: 1.2; pointer-events: all; white-space: normal; word-wrap: normal; "><h1 style="margin-top: 0px;">0. Project Creation</h1><p>A simple, single, README, possibly a single specification describing the features in a proof of concept. No issue tracker, little to no existing code.</p><p>Code and generated tickets need more review, possibly hand fixing. LLM needs longer, context heavy prompts. </p></div></div></div></foreignObject><text x="11" y="124" fill="light-dark(#000000, #ffffff)" font-family="Helvetica" font-size="13px">0. Project Creation...</text></switch></g></g></g><g data-cell-id="wBIAXKxkVHZm5fD3SIu9-7"><g transform="translate(0.5,0.5)"><rect x="339" y="104" width="230" height="245" fill="none" stroke="none" pointer-events="all"/></g><g><g><switch><foreignObject style="overflow: visible; text-align: left;" pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe flex-start; justify-content: unsafe flex-start; width: 228px; height: 1px; padding-top: 111px; margin-left: 341px;"><div style="box-sizing: border-box; font-size: 0; text-align: left; max-height: 241px; overflow: hidden; color: #000000; "><div style="display: inline-block; font-size: 13px; font-family: Helvetica; color: light-dark(#000000, #ffffff); line-height: 1.2; pointer-events: all; white-space: normal; word-wrap: normal; "><h1 style="margin-top: 0px;">1. Proof of Concept</h1><p><span style="background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));">README and agent files describe how to run tests, run the application, and more. </span><span style="background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));">Firm designs decisions are written to the project's repositories. Work is becoming structured and identifies discrete components to build.  </span></p><p><span style="background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));">Code and generated tickets still need review but few to no fixes.</span></p></div></div></div></foreignObject><text x="341" y="124" fill="light-dark(#000000, #ffffff)" font-family="Helvetica" font-size="13px">1. Proof of Concept...</text></switch></g></g></g><g data-cell-id="wBIAXKxkVHZm5fD3SIu9-8"><g transform="translate(0.5,0.5)"><rect x="754" y="34" width="120" height="60" rx="9" ry="9" fill="#ffffff" stroke="#000000" pointer-events="all" style="fill: light-dark(#ffffff, var(--ge-dark-color, #121212)); stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"/></g><g><g fill="#000000" font-family="Helvetica" text-anchor="middle" font-size="13px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="814" y="69.5"><tspan>The "project"</tspan></text></g></g></g><g data-cell-id="wBIAXKxkVHZm5fD3SIu9-10"><g transform="translate(0.5,0.5)"><rect x="719" y="104" width="210" height="305" fill="none" stroke="none" pointer-events="all"/></g><g><g><switch><foreignObject style="overflow: visible; text-align: left;" pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe flex-start; justify-content: unsafe flex-start; width: 208px; height: 1px; padding-top: 111px; margin-left: 721px;"><div style="box-sizing: border-box; font-size: 0; text-align: left; max-height: 301px; overflow: hidden; color: #000000; "><div style="display: inline-block; font-size: 13px; font-family: Helvetica; color: light-dark(#000000, #ffffff); line-height: 1.2; pointer-events: all; white-space: normal; word-wrap: normal; "><h1 style="margin-top: 0px;">2. Development</h1><p><span style="background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));">README and agent files describe how to run tests, run the application, and more. </span><span style="background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));">Firm designs decisions are written to the project's repositories. The project structure does not change from feature to feature. New features are documented in writing for both the user and the LLM to reference. </span></p><p><span style="background-color: transparent; color: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));">Code can be generated directly from tickets without intermediate plan review and generally results in working, tested, features.</span></p></div></div></div></foreignObject><text x="721" y="124" fill="light-dark(#000000, #ffffff)" font-family="Helvetica" font-size="13px">2. Development...</text></switch></g></g></g></g></g></g></svg>